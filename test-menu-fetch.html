<!DOCTYPE html>
<html>
<head>
    <title>Test Menu API</title>
</head>
<body>
    <h1>Testing Menu API</h1>
    <button onclick="testMenu()">Fetch Menu</button>
    <pre id="output"></pre>

    <script>
        async function testMenu() {
            const output = document.getElementById('output');
            output.textContent = 'Loading...';
            
            try {
                const response = await fetch('http://localhost:3000/api/menu?location=header&language=en');
                const data = await response.json();
                
                output.textContent = JSON.stringify(data, null, 2);
                
                console.log('Menu items:', data.items);
                console.log('Number of items:', data.items?.length);
                
                if (data.items) {
                    data.items.forEach((item, i) => {
                        console.log(`${i + 1}. ${item.label}`, item.dropdown ? 'HAS DROPDOWN' : 'NO DROPDOWN');
                    });
                }
            } catch (error) {
                output.textContent = 'Error: ' + error.message;
                console.error(error);
            }
        }
    </script>
</body>
</html>
